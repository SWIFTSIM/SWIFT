# Define some meta-data about the simulation
MetaData:
  run_name:   FLAMINGO-Jet

# Define the system of units to use internally. 
InternalUnitSystem:
  UnitMass_in_cgs:     1.98841e43    # 10^10 M_sun in grams
  UnitLength_in_cgs:   3.08567758e24 # Mpc in centimeters
  UnitVelocity_in_cgs: 1e5           # km/s in centimeters per second
  UnitCurrent_in_cgs:  1             # Amperes
  UnitTemp_in_cgs:     1             # Kelvin

# Cosmological parameters
Cosmology:
  h:              0.681        # Reduced Hubble constant
  a_begin:        0.03125      # Initial scale-factor of the simulation
  a_end:          1.0          # Final scale factor of the simulation
  Omega_cdm:      0.256011     # Matter density parameter
  Omega_lambda:   0.693922     # Dark-energy density parameter
  Omega_b:        0.048600     # Baryon density parameter
  T_nu_0:         1.9517578050 # Present-day neutrino temperature in internal units, used for massive neutrinos
  N_ur:           2.0308       # Number of ultra-relativistic species (e.g. massless neutrinos). Assumes instantaneous decoupling T_ur/T_g=(4/11)^(1/3). Cannot be used together with Omega_r.
  N_nu:           1            # Integer number of massive neutrinos. Note that neutrinos do NOT contribute to Omega_m = Omega_cdm + Omega_b in our conventions.
  M_nu_eV:        0.06         # Comma-separated list of N_nu nonzero neutrino masses in electron-volts
  deg_nu:         1.0          # Comma-separated list of N_nu neutrino degeneracies (default values of 1.0)

# Parameters governing the time integration
TimeIntegration:
  dt_min:     1e-10 # The minimal time-step size of the simulation (in internal units).
  dt_max:     1e-2  # The maximal time-step size of the simulation (in internal units).
  
# Parameters governing the snapshots
Snapshots:
  basename:            flamingo # Common part of the snapshot names
  output_list_on:      1
  output_list:         ../output_list.txt
  select_output_on:    1
  select_output:       ../select_output.yml
  compression:         4
  distributed:         1
  use_delta_from_edge: 1     # Lossy compression demands we shift things a tiny bit to avoid out-of-box rounding.
  delta_from_edge:     1e-5  # (Internal units) We shift by 10pc.  
  invoke_fof:          1

# Parameters governing the conserved quantities statistics
Statistics:
  delta_time:           1.01
  scale_factor_first:   0.03126

# Job check-pointing and stop time
Restarts:
  onexit:       1
  stop_steps:   25                   # Check for the presence of a 'stop' file every 25 steps
  delta_hours:  6.0                  # Write a restart file every 6 hours.
  max_run_time: 71.5                 # Job runtime before stopping: Three days minus fergie time
  resubmit_on_exit:   1
  resubmit_command:   ./resub.sh     # Command to run when exiting to resubmit the job.

# Parameters for the self-gravity scheme
Gravity:
  eta:                         0.025     # Constant dimensionless multiplier for time integration.
  MAC:                         adaptive  # Use the advanced opening angle condition
  theta_cr:                    0.7       # Opening angle
  epsilon_fmm:                 0.001     # Adaptive opening angle criterion
  use_tree_below_softening:    0
  mesh_side_length:            128
  comoving_DM_softening:         0.0223 # Comoving softening for DM (22.3 ckpc, no h)           
  max_physical_DM_softening:     0.0057 # Physical softening for DM (5.7 kpc, no h)             
  comoving_baryon_softening:     0.0223 # Comoving softening for baryons (22.3 ckpc, no h)      
  max_physical_baryon_softening: 0.0057 # Physical softening for baryons (5.7 kpc, no h)        
  comoving_nu_softening:         0.0223 # Comoving Plummer-equivalent softening length for neutrino particles (in internal units).
  max_physical_nu_softening:     0.0057 # Maximal Plummer-equivalent softening length in physical coordinates for neutrino particles (in internal units).

# Parameters for the hydrodynamics scheme
SPH:
  resolution_eta:                    1.2348   # Target smoothing length in units of the mean inter-particle separation (1.2348 == 48Ngbs with the cubic spline kernel).
  h_min_ratio:                       0.01     # Minimal smoothing length in units of softening.
  h_max:                             3.0      # Maximal smoothing length in co-moving internal units.
  CFL_condition:                     0.2      # Courant-Friedrich-Levy condition for time integration.
  minimal_temperature:               100.0    # (internal units)
  initial_temperature:               268.7    # (internal units)
  particle_splitting:                1        # Particle splitting is ON
  particle_splitting_mass_threshold: 0.4      # (internal units, i.e. 4e9 Msun ~ 4x initial gas particle mass)

# Parameters of the stars neighbour search
Stars:
  resolution_eta:        1.1642   # Target smoothing length in units of the mean inter-particle separation
  h_tolerance:           7e-3
  luminosity_filename:   ./photometry
  timestep_age_threshold_unlimited_Myr: 45.1       # (Optional) Age above which stars have no time-step restriction any more (in Mega-years). Defaults to 0.
  timestep_age_threshold_Myr:           45.        # (Optional) Age at which stars switch from young to old for time-stepping purposes (in Mega-years). Defaults to FLT_MAX.
  max_timestep_young_Myr:               1.         # (Optional) Maximal time-step length of young stars (in Mega-years). Defaults to FLT_MAX.

# Parameters for the Friends-Of-Friends algorithm
FOF:
  basename:                        fof_output  # Filename for the FOF outputs.
  min_group_size:                  32          # The minimum no. of particles required for a group.
  linking_length_ratio:            0.2         # Linking length in units of the main inter-particle separation.
  seed_black_holes_enabled:        1           # Enable seeding of black holes in FoF groups
  black_hole_seed_halo_mass_Msun:  2.757e11    # Minimal halo mass in which to seed a black hole (in solar masses) (1.93e11 / 0.7).
  scale_factor_first:              0.05        # Scale-factor of first FoF black hole seeding calls.
  delta_time:                      1.00751     # Scale-factor ratio between consecutive FoF black hole seeding calls.
  linking_types:                   [0, 1, 0, 0, 0, 0, 0]
  attaching_types:                 [1, 0, 0, 0, 1, 1, 0]

# Task scheduling options
Scheduler:
  max_top_level_cells:   16
  cell_split_size:       200

# Parameters related to the initial conditions
InitialConditions:
  file_name:  FLAMINGO_m9_ICs.hdf5
  periodic:   1

# Impose primoridal metallicity
EAGLEChemistry:
  init_abundance_metal:     0.
  init_abundance_Hydrogen:  0.752            
  init_abundance_Helium:    0.248
  init_abundance_Carbon:    0.0
  init_abundance_Nitrogen:  0.0
  init_abundance_Oxygen:    0.0
  init_abundance_Neon:      0.0
  init_abundance_Magnesium: 0.0
  init_abundance_Silicon:   0.0
  init_abundance_Iron:      0.0
  
# PS2020 cooling parameters
PS2020Cooling:
  dir_name:                ./UV_dust1_CR1_G1_shield1.hdf5 # Location of the cooling tables
  H_reion_z:               7.5               # Redshift of Hydrogen re-ionization (Planck 2018)
  H_reion_eV_p_H:          2.0
  He_reion_z_centre:       3.5               # Redshift of the centre of the Helium re-ionization Gaussian
  He_reion_z_sigma:        0.5               # Spread in redshift of the  Helium re-ionization Gaussian
  He_reion_eV_p_H:         2.0               # Energy inject by Helium re-ionization in electron-volt per Hydrogen atom
  delta_logTEOS_subgrid_properties: 0.3      # delta log T above the EOS below which the subgrid properties use Teq assumption
  rapid_cooling_threshold:          0.333333 # Switch to rapid cooling regime for dt / t_cool above this threshold.

# EAGLE star formation parameters
EAGLEStarFormation:
  SF_threshold:                      Zdep         # Zdep (Schaye 2004) or Subgrid
  SF_model:                          PressureLaw  # PressureLaw (Schaye et al. 2008) or SchmidtLaw
  KS_normalisation:                  1.515e-4     # The normalization of the Kennicutt-Schmidt law in Msun / kpc^2 / yr.
  KS_exponent:                       1.4          # The exponent of the Kennicutt-Schmidt law.
  min_over_density:                  100.0        # The over-density above which star-formation is allowed.
  KS_high_density_threshold_H_p_cm3: 1e8          # Hydrogen number density above which the Kennicut-Schmidt law changes slope in Hydrogen atoms per cm^3.
  KS_high_density_exponent:          2.0          # Slope of the Kennicut-Schmidt law above the high-density threshold.
  EOS_entropy_margin_dex:            0.3          # When using Z-based SF threshold, logarithm base 10 of the maximal entropy above the EOS at which stars can form.
  threshold_norm_H_p_cm3:            0.1          # When using Z-based SF threshold, normalisation of the metal-dependant density threshold for star formation in Hydrogen atoms per cm^3.
  threshold_Z0:                      0.002        # When using Z-based SF threshold, reference metallicity (metal mass fraction) for the metal-dependant threshold for star formation.
  threshold_slope:                   0.0          # When using Z-based SF threshold, slope of the metal-dependant star formation threshold
  threshold_max_density_H_p_cm3:     0.1          # When using Z-based SF threshold, maximal density of the metal-dependant density threshold for star formation in Hydrogen atoms per cm^3.

# Parameters for the EAGLE "equation of state" (NOTE: The Cool floor is below the min T and is hence disabled0
EAGLEEntropyFloor:
  Jeans_density_threshold_H_p_cm3: 1e-4      # Physical density above which the EAGLE Jeans limiter entropy floor kicks in expressed in Hydrogen atoms per cm^3.
  Jeans_over_density_threshold:    10.       # Overdensity above which the EAGLE Jeans limiter entropy floor can kick in.
  Jeans_temperature_norm_K:        800       # Temperature of the EAGLE Jeans limiter entropy floor at the density threshold expressed in Kelvin.
  Jeans_gamma_effective:           1.3333333 # Slope the of the EAGLE Jeans limiter entropy floor
  Cool_density_threshold_H_p_cm3: 1e-5       # Physical density above which the EAGLE Cool limiter entropy floor kicks in expressed in Hydrogen atoms per cm^3.
  Cool_over_density_threshold:    10.        # Overdensity above which the EAGLE Cool limiter entropy floor can kick in.
  Cool_temperature_norm_K:        10.        # Temperature of the EAGLE Cool limiter entropy floor at the density threshold expressed in Kelvin. (NOTE: This is below the min T and hence this floor does nothing)
  Cool_gamma_effective:           1.         # Slope the of the EAGLE Cool limiter entropy floor

# EAGLE feedback model
EAGLEFeedback:
  use_SNII_feedback:                    1               # Global switch for SNII thermal (stochastic) feedback.
  use_SNIa_feedback:                    1               # Global switch for SNIa thermal (continuous) feedback.
  use_AGB_enrichment:                   1               # Global switch for enrichement from AGB stars.
  use_SNII_enrichment:                  1               # Global switch for enrichement from SNII stars.
  use_SNIa_enrichment:                  1               # Global switch for enrichement from SNIa stars.
  filename:                             ./yieldtables/  # Path to the directory containing the EAGLE yield tables.
  IMF_min_mass_Msun:                    0.1             # Minimal stellar mass considered for the Chabrier IMF in solar masses.
  IMF_max_mass_Msun:                    100.0           # Maximal stellar mass considered for the Chabrier IMF in solar masses.
  SNII_min_mass_Msun:                   8.0             # Minimal mass considered for SNII stars in solar masses.
  SNII_max_mass_Msun:                   100.0           # Maximal mass considered for SNII stars in solar masses.
  SNII_sampled_delay:                   1               # Sample the SNII lifetimes to do feedback.
  SNII_energy_erg:                      1.0e51          # Energy of one SNII explosion in ergs.
  SNII_delta_v_km_p_s:                  477.454729865   # Velocity kick to give to the gas particles in SNII feedback events.
  SNII_energy_fraction_min:             0.16591163      # Minimal fraction of energy applied in a SNII feedback event.
  SNII_energy_fraction_max:             0.16591163      # Maximal fraction of energy applied in a 
  SNII_energy_fraction_Z_0:             0.0012663729    # Pivot point for the metallicity dependance of the SNII energy fraction (metal mass fraction).
  SNII_energy_fraction_n_0_H_p_cm3:     1.4588          # Pivot point for the birth density dependance of the SNII energy fraction in cm^-3.
  SNII_energy_fraction_n_Z:             0.8686          # Power-law for the metallicity dependance of the SNII energy fraction.
  SNII_energy_fraction_n_n:             0.8686          # Power-law for the birth density dependance of the SNII energy fraction.
  SNII_energy_fraction_use_birth_density: 0             # Are we using the density at birth to compute f_E or at feedback time?
  SNII_energy_fraction_use_birth_metallicity: 0         # Are we using the metallicity at birth to compuote f_E or at feedback time?
  SNIa_DTD:                             Exponential     # Functional form of the SNIa delay time distribution.
  SNIa_DTD_delay_Gyr:                   0.04            # Stellar age after which SNIa start in Gyr (40 Myr corresponds to stars ~ 8 Msun).
  SNIa_DTD_exp_timescale_Gyr:           2.0             # Time-scale of the exponential decay of the SNIa rates in Gyr.
  SNIa_DTD_exp_norm_p_Msun:             0.002           # Normalisation of the SNIa rates in inverse solar masses.
  SNIa_energy_erg:                      1.0e51          # Energy of one SNIa explosion in ergs.
  AGB_ejecta_velocity_km_p_s:           10.0            # Velocity of the AGB ejectas in km/s.
  stellar_evolution_age_cut_Gyr:        0.1             # Stellar age in Gyr above which the enrichment is down-sampled.
  stellar_evolution_sampling_rate:      10              # Number of time-steps in-between two enrichment events for a star above the age threshold.
  SNII_yield_factor_Hydrogen:           1.0             # (Optional) Correction factor to apply to the Hydrogen yield from the SNII channel.
  SNII_yield_factor_Helium:             1.0             # (Optional) Correction factor to apply to the Helium yield from the SNII channel.
  SNII_yield_factor_Carbon:             0.5             # (Optional) Correction factor to apply to the Carbon yield from the SNII channel.
  SNII_yield_factor_Nitrogen:           1.0             # (Optional) Correction factor to apply to the Nitrogen yield from the SNII channel.
  SNII_yield_factor_Oxygen:             1.0             # (Optional) Correction factor to apply to the Oxygen yield from the SNII channel.
  SNII_yield_factor_Neon:               1.0             # (Optional) Correction factor to apply to the Neon yield from the SNII channel.
  SNII_yield_factor_Magnesium:          2.0             # (Optional) Correction factor to apply to the Magnesium yield from the SNII channel.
  SNII_yield_factor_Silicon:            1.0             # (Optional) Correction factor to apply to the Silicon yield from the SNII channel.
  SNII_yield_factor_Iron:               0.5             # (Optional) Correction factor to apply to the Iron yield from the SNII channel.

# Spin-jet AGN model
SPINJETAGN:
  subgrid_seed_mass_Msun:             1e5
  use_multi_phase_bondi:              0
  use_subgrid_gas_properties:         0
  use_krumholz:                       0
  with_krumholz_vorticity:            0
  with_angmom_limiter:                0    
  with_boost_factor:                  1
  boost_alpha:                        1.        
  boost_beta:                         0.59700241
  boost_n_h_star_cm3:                 0.1
  max_eddington_fraction:             1.
  eddington_fraction_for_recording:   0.1
  use_nibbling:                       1
  min_gas_mass_for_nibbling_Msun:     5.38e8    
  coupling_efficiency:                0.03
  AGN_delta_T_model:                  Constant
  AGN_delta_T_K:                      1.0
  AGN_num_ngb_to_heat:                1.
  with_potential_correction:          1        
  max_reposition_mass_Msun:           1e20      
  max_reposition_distance_ratio:      3.0
  with_reposition_velocity_threshold: 0
  set_reposition_speed:               0
  threshold_major_merger:             0.333
  threshold_minor_merger:             0.1
  merger_threshold_type:              DynamicalEscapeVelocity
  merger_max_distance_ratio:          3.0
  AGN_use_deterministic_feedback:     1          
  AGN_feedback_model:                 MinimumDistance  
  minimum_timestep_yr:                100000.0    
  include_jets:                       1
  turn_off_radiative_feedback:        1                         # If set to '1', thermal feedback will not be used at high accretion rates (above 0.01 Eddington fraction). Instead, jets will always be used, and all subgrid accretion disks will be considered thick (advection-dominated, the ones where jets are thought to be present).
  alpha_acc:                          0.2
  AGN_jet_velocity_model:             Constant                  # 'Constant' will use a single jet velocity for all jet kicks. 'BlackHoleMass' will lead to the jet velocities scaling with black hole masses.
  v_jet_km_p_s:                       836.152745299                   # The jet velocity if 'AGN_jet_velocity_model' is 'Constant'
  opening_angle_in_degrees:           7.5
  N_jet:                              2
  AGN_jet_feedback_model:             SpinAxis
  eps_f_jet:                          1.
  fix_jet_efficiency:                 1                         # This will cause the jet efficiencies to not vary with spin, and instead use a fixed value. However, the spin directions (and therefore the jet directions) will still evolve with time.
  jet_efficiency:                     0.015                     # The fixed jet efficiency if 'fix_jet_efficiency' is '1'.
  fix_radiative_efficiency:           0
  radiative_efficiency:               0.1
  TD_region:                          C
  delta_ADAF:                         0.2
  include_slim_disk:                  0
  seed_spin:                          0.001
  mdot_crit_ADAF:                     1e10
  use_jets_in_thin_disc:              0
  fix_jet_direction:                  0
  use_ADIOS_winds:                    0
  slim_disc_wind_factor:              0
  accretion_efficiency_slim:          1.
  accretion_efficiency_mode:          Constant
  accretion_efficiency_thick:         1.

PowerSpectrum:
  grid_side_length: 256                          # size of the grid used in power spectrum calculation (default: 256)
  num_folds: 6                                   # Number of foldings (1 means no foldings), determines the max k
  fold_factor: 4                                 # factor by which to reduce the box along each side each folding (default: 4)
  window_order: 3                                # order of the mass assignment scheme (default: 3, TSC)
  requested_spectra: ["matter-matter","cdm-cdm","starBH-starBH","gas-matter","pressure-pressure","matter-pressure", "neutrino0-neutrino1", "cdm-neutrino", "cdm-gas", "gas-gas", "cdm-starBH", "gas-starBH", "gas-neutrino", "starBH-neutrino"]
  output_list_on:      1
  output_list:         ../output_list_ps.txt

Neutrino:
  use_delta_f_mesh_only:              1       # Use the delta-f method, but only in the mesh gravity calculation and outputs
  generate_ics:                       1       # Automatically generate neutrino velocities at the start of the run
  neutrino_seed:                      0       # Seed used in the delta-f weighting step for Fermi-Dirac momentum generation

XrayEmissivity:
  xray_table_path:         ./X_Ray_tables_flamingo.hdf5   # Path to the X-ray emissivity tables

# Parameters common to all lightcones
LightconeCommon:

  subdir:               lightcones   # All lightcone output is written to this directory
  buffer_chunk_size:    100000       # Particles and map updates are buffered in a linked list of chunks of this size

  max_particles_buffered: 10000000  # Output particles if buffer size reaches this value
  max_updates_buffered:   10000000  # Flush map updates if buffer size reaches this value
  hdf5_chunk_size:        32768     # Chunk size for HDF5 particle and healpix map datasets

  nside:                       16384                  # Healpix resolution parameter
  max_map_update_send_size_mb: 512.0                  # Apply map updates over multiple iterations to limit memory overhead
  map_names_file:              ../map_types.txt       # List of types of healpix maps to make and compression filters to use

  distributed_maps:   1           # Split maps over multiple files (1) or use collective I/O to write one file (0)

  particles_lossy_compression: 1  # Apply lossy compression to lightcone particles (filters set in lightcone_particle_io.c)
  particles_gzip_level:        6  # Apply lossless (deflate) compression to lightcone particles
  maps_gzip_level:             6  # Apply lossless (deflate) compression to healpix maps

  # Filtering out of gas from the lightcone particle output
  gas_filtering_enabled:      1
  min_z_for_gas_filtering:    0.25   # Filter gas particles above this redshift, output all below
  min_temp_for_filtered_gas:  1.0e5  # At z>min_z_for_high_z_gas only output gas with temperature above this
  min_nh_for_filtered_gas:    1.0e-6 # At z>min_z_for_high_z_gas only output gas with nh/(1+z)^4 above this

  # Exclusion of AGN heated particles from healpix maps
  xray_maps_recent_AGN_injection_exclusion_time_myr: 15
  xray_maps_recent_AGN_injection_delta_logT_min:    -1.0
  xray_maps_recent_AGN_injection_delta_logT_max:     0.3

# Parameters specific to individual lightcones
Lightcone0:
  enabled: 1                                     # Enable this lightcone
  basename: lightcone0                           # Base name of this lightcone's output files
  observer_position: [ 750.0,  750.0,  750.0]    # Location of the observer in this lightcone
  radius_file: ../shell_redshifts_z3.txt         # Redshifts of shells for healpix maps
  # Output redshift range
  z_range_for_DM:         [0.0, 0.25]
  z_range_for_Neutrino:   [0.0, 0.25]
  z_range_for_Gas:        [0.0, 0.5]
  z_range_for_Stars:      [0.0, 0.5]
  z_range_for_BH:         [0.0, 15.0]

# Parameters specific to individual lightcones
Lightcone1:
  enabled: 1                                     # Enable this lightcone
  basename: lightcone1                           # Base name of this lightcone's output files
  observer_position: [ 250.0,  250.0,  250.0]    # Location of the observer in this lightcone
  radius_file: ../shell_redshifts_z0p5.txt       # Redshifts of shells for healpix maps
  # Output redshift range
  z_range_for_BH:         [0.0, 15.0]
