# Define the system of units to use internally.
InternalUnitSystem:
  UnitMass_in_cgs:     1   # Grams
  UnitLength_in_cgs:   1   # Centimeters
  UnitVelocity_in_cgs: 1   # Centimeters per second
  UnitCurrent_in_cgs:  1   # Amperes
  UnitTemp_in_cgs:     1   # Kelvin

# Parameters governing the time integration
TimeIntegration:
  time_begin: 0.0    # The starting time of the simulation (in internal units).
  time_end:   1.5e-4 # The end time of the simulation (in internal units).
  dt_min:     1e-20  # The minimal time-step size of the simulation (in internal units).
  dt_max:     1e-6   # The maximal time-step size of the simulation (in internal units).

# Parameters governing the snapshots
Snapshots:
  basename:            fluid_solid  # Common part of the name of output files
  time_first:          0.                # Time of the first output (in internal units)
  delta_time:          1e-5             # Time difference between consecutive outputs (in internal units).

# Parameters governing the conserved quantities statistics
Statistics:
  delta_time:          1e-6 # Time between statistics output

# Parameters for the hydrodynamics scheme
SPH:
  resolution_eta:        1.487    # Target smoothing length in units of the mean inter-particle separation (1.487 == 100Ngbs with the Wendland C2 kernel).
  CFL_condition:         0.1      # Courant-Friedrich-Levy condition for time integration.

# Parameters related to the initial conditions
InitialConditions:
  file_name:  ./fluid_solid.hdf5     # The file to read
  periodic:   1

Scheduler:
    max_top_level_cells:      40         # Maximal number of top-level cells in any dimension.

# Parameters related to the equation of state
EoS:
    planetary_use_linear_0:    1
    planetary_linear_0_param_file: ./fluid_linear_eos_params.txt
    linear_0_mat_params_file: ./fluid_linear_mat_params.yml

    planetary_use_linear_1:    1
    planetary_linear_1_param_file: ./solid_linear_eos_params.txt
    linear_1_mat_params_file: ./solid_linear_mat_params.yml
