# Minimum working example configuration file to run HBT-HERONS on SWIFT
# snapshots. Refer to the HBT-HERONS documentation for a full listing of
# available parameters and their descriptions.

[================================== FILE PATHS ================================]

# Path to where the snapshot files are. For SWIFT outputs with invoke_fof=1,
# the FoF group information is embedded in the snapshots, so both paths are
# the same.
SnapshotPath ./outputs/SWIFT/
HaloPath ./outputs/SWIFT/

# Base name for the snapshot files, e.g. <SnapshotFileBase>_<snap_nr>.hdf5
SnapshotFileBase snap

# Where the catalogues will be saved.
SubhaloPath ./outputs/HBT-HERONS

# The minimum and maximum snapshot number to analyse.
# With delta_time=1.04 and scale_factor_first=0.1, this run produces 59
# snapshots (indices 0-58). Update MaxSnapshotIndex if your run differs.
MinSnapshotIndex 0
MaxSnapshotIndex 58

[=================================== FILE IO ==================================]

SnapshotFormat  swiftsim
GroupFileFormat swiftsim_particle_index

[==================================== UNITS ===================================]

# Read in directly from the SWIFT snapshot.
MassInMsunh  -1
LengthInMpch -1
VelInKmS     -1

[================================ SIMULATION BOX ==============================]

PeriodicBoundaryOn 1

# Read in directly from the SWIFT snapshot.
BoxSize -1

[=========================== GRAVITATIONAL SOFTENING ==========================]

# Read in directly from the SWIFT snapshot.
SofteningHalo -1
MaxPhysicalSofteningHalo -1
