MetaData:
  run_name:   BalsaraKim

# Define the system of units to use internally. 
InternalUnitSystem:
  UnitMass_in_cgs:     6.757e41  # g
  UnitLength_in_cgs:   3.086e21  # cm
  UnitVelocity_in_cgs: 38.23e5   # Centimeters per second
  UnitCurrent_in_cgs:  1.e10     # Amperes
  UnitTemp_in_cgs:     1         # Kelvin

# Parameters governing the time integration
TimeIntegration:
  time_begin: 0.      # The starting time of the simulation (in internal units).
  time_end:   3.5e-2  # The end time of the simulation (in internal units).
  dt_min:     1.e-18  # The minimal time-step size of the simulation (in internal units).
  dt_max:     1.e-3   # The maximal time-step size of the simulation (in internal units).

# Parameters governing the snapshots
Snapshots:
  subdir:              snapshots
  basename:            BK # Common part of the name of output files
  time_first:          0.
  delta_time:          6.e-4
  recording_triggers_part: [-1, -1]
  recording_triggers_spart: [-1, -1]
  recording_triggers_bpart: [-1, -1]

# Parameters governing the conserved quantities statistics
Statistics:
  delta_time:          1e-5 # Time between statistics output
  time_first:          0.   # Time of first statistics output

# Parameters for the hydrodynamics scheme
SPH:
  resolution_eta:        1.595   # Target smoothing length in units of the mean inter-particle separation (1.2348 == 48Ngbs with the cubic spline kernel).
  CFL_condition:         0.1     # Courant-Friedrich-Levy condition for time integration.
  minimal_temperature:   1.e2
  max_ghost_iterations:  1000
  h_max:                 0.02     # Maximum smoothing length. Since the density in the post-shock region becomes very low, we need to make sure that this does not exceed 1/3 of the periodic box (including kernel gamma ~ 2)

# Parameters related to the initial conditions
InitialConditions:
  file_name:  ./BalsaraKim.hdf5          # The file to read
  periodic:   1

EAGLECooling:
  H_reion_z:             11.5
  H_reion_eV_p_H:        2.0
  He_reion_z_centre:     3.5
  He_reion_z_sigma:      0.5
  He_reion_eV_p_H:       2.0
  dir_name: ./coolingtables/

EAGLEChemistry:
  init_abundance_metal:        4.75e-4        #4.75e-4  0.014        # Mass fraction in *all* metals
  init_abundance_Hydrogen:     0.999525   #0.999525 0.70649785   # Mass fraction in Hydrogen
  init_abundance_Helium:       0.   #0.       0.28055534   # Mass fraction in Helium
  init_abundance_Carbon:       1.4e-4 #1.4e-4   2.0665436e-3 # Mass fraction in Carbon
  init_abundance_Nitrogen:     0. #0.       8.3562563e-4 # Mass fraction in Nitrogen
  init_abundance_Oxygen:       3.2e-4 #3.2e-4   5.4926244e-3 # Mass fraction in Oxygen
  init_abundance_Neon:         0. #0.       1.4144605e-3 # Mass fraction in Neon
  init_abundance_Magnesium:    0.  #0.       5.907064e-4  # Mass fraction in Magnesium
  init_abundance_Silicon:      1.5e-5  #1.5e-5   6.825874e-4  # Mass fraction in Silicon
  init_abundance_Iron:         0. #0.       1.1032152e-3 # Mass fraction in Iron

Stars:
  overwrite_birth_time:        0
  overwrite_birth_density:     0
  overwrite_birth_temperature: 0
  luminosity_filename:         ./photometry
  timestep_age_threshold_unlimited_Myr: 1000.        # (Optional) Age above which stars have no time-step restriction any more (in Mega-years). Defaults to 0.
  timestep_age_threshold_Myr:           10.          # (Optional) Age at which stars switch from young to old for time-stepping purposes (in Mega-years). Defaults to FLT_MAX.
  max_timestep_young_Myr:               0.1          # (Optional) Maximal time-step length of young stars (in Mega-years). Defaults to FLT_MAX.
  max_timestep_old_Myr:                 1.0          # (Optional) Maximal time-step length of old stars (in Mega-years). Defaults to FLT_MAX. 

ConstantPotential:
  g_cgs:   [0., 0., 0.]    # run with zero potential (ie. stars have fixed position)

# EAGLE feedback model
EAGLEFeedback:
  use_SNII_feedback:                   1               # Global switch for SNII thermal (stochastic) feedback.
  use_SNIa_feedback:                   0               # Global switch for SNIa thermal (continuous) feedback.
  use_AGB_enrichment:                  0               # Global switch for enrichement from AGB stars.
  use_SNII_enrichment:                 0               # Global switch for enrichement from SNII stars.
  use_SNIa_enrichment:                 0               # Global switch for enrichement from SNIa stars.
  filename:                            ./yieldtables/  # Path to the directory containing the EAGLE yield tables.
  IMF_min_mass_Msun:                   0.1             # Minimal stellar mass considered for the Chabrier IMF in solar masses.
  IMF_max_mass_Msun:                 100.0             # Maximal stellar mass considered for the Chabrier IMF in solar masses.
  SNII_min_mass_Msun:                  6.0             # Minimal mass considered for SNII stars in solar masses.
  SNII_max_mass_Msun:                100.0             # Maximal mass considered for SNII stars in solar masses.
  SNII_feedback_model:                 MinimumDistance # Feedback modes: Random, Isotropic, MinimumDistance, MinimumDensity
  SNII_sampled_delay:                  0               # Sample the SNII lifetimes to do feedback.
  SNII_wind_delay_Gyr:                 0.            # Time in Gyr between a star's birth and the SNII thermal feedback event when not sampling.
  SNII_delta_T_K:                      3.1e7         # Change in temperature to apply to the gas particle in a SNII thermal feedback event in Kelvin.
  SNII_delta_v_km_p_s:                 0             # Velocity kick applied by the stars when doing SNII feedback (in km/s).
  SNII_energy_erg:                     1.0e53          # Energy of one SNII explosion in ergs.
  SNII_energy_fraction_function:       EAGLE     # Type of functional form to use for scaling the energy fraction with density and metallicity ('EAGLE', 'Separable', or 'Independent')
  SNII_energy_fraction_min:            1.0             # Minimal fraction of energy applied in a SNII feedback event.
  SNII_energy_fraction_max:            1.0             # Maximal fraction of energy applied in a SNII feedback event.
  SNII_energy_fraction_delta_E_n:      6.0             # Maximal energy increase due to high density (only used if SNII_energy_fraction_function is 'Independent').
  SNII_energy_fraction_Z_0:            0.0012663729    # Pivot point for the metallicity dependance of the SNII energy fraction (metal mass fraction).
  SNII_energy_fraction_n_0_H_p_cm3:    0.67            # Pivot point for the birth density dependance of the SNII energy fraction in cm^-3.
  SNII_energy_fraction_n_Z:            0.8686          # Power-law for the metallicity dependance of the SNII energy fraction.
  SNII_energy_fraction_n_n:            0.8686          # Power-law for the (birth) density dependance of the SNII energy fraction.
  SNII_energy_fraction_use_birth_density: 1            # Are we using the density at birth to compute f_E or at feedback time?
  SNII_energy_fraction_use_birth_metallicity: 1        # Are we using the metallicity at birth to compute f_E or at feedback time?
  SNIa_DTD:                            PowerLaw        # Functional form of the SNIa delay time distribution Two choices: 'PowerLaw' or 'Exponential'.
  SNIa_DTD_delay_Gyr:                  0.04            # Stellar age after which SNIa start in Gyr (40 Myr corresponds to stars ~ 8 Msun).
  SNIa_DTD_power_law_norm_p_Msun:      0.0012          # Normalization of the SNIa delay time distribution in the power-law DTD case (in Msun^-1).
  SNIa_DTD_exp_norm_p_Msun:            0.002           # Normalization of the SNIa delay time distribution in the exponential DTD case (in Msun^-1).
  SNIa_DTD_exp_timescale_Gyr:          2.0             # Time-scale of the SNIa delay time distribution in the exponential DTD case (in Gyr).
  SNIa_energy_erg:                    1.0e51           # Energy of one SNIa explosion in ergs.
  AGB_ejecta_velocity_km_p_s:         10.0             # Velocity of the AGB ejectas in km/s.
  stellar_evolution_age_cut_Gyr:       0.1             # Stellar age in Gyr above which the enrichment is down-sampled.
  stellar_evolution_sampling_rate:      10             # Number of time-steps in-between two enrichment events for a star above the age threshold.
  SNII_yield_factor_Hydrogen:          1.0             # (Optional) Correction factor to apply to the Hydrogen yield from the SNII channel.
  SNII_yield_factor_Helium:            1.0             # (Optional) Correction factor to apply to the Helium yield from the SNII channel.
  SNII_yield_factor_Carbon:            0.5             # (Optional) Correction factor to apply to the Carbon yield from the SNII channel.
  SNII_yield_factor_Nitrogen:          1.0             # (Optional) Correction factor to apply to the Nitrogen yield from the SNII channel.
  SNII_yield_factor_Oxygen:            1.0             # (Optional) Correction factor to apply to the Oxygen yield from the SNII channel.
  SNII_yield_factor_Neon:              1.0             # (Optional) Correction factor to apply to the Neon yield from the SNII channel.
  SNII_yield_factor_Magnesium:         2.0             # (Optional) Correction factor to apply to the Magnesium yield from the SNII channel.
  SNII_yield_factor_Silicon:           1.0             # (Optional) Correction factor to apply to the Silicon yield from the SNII channel.
  SNII_yield_factor_Iron:              0.5             # (Optional) Correction factor to apply to the Iron yield from the SNII channel.

Scheduler:
  tasks_per_cell: 200
